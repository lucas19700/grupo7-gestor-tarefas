version: '3'

services:
  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    ports:
      - "50051:50051"
      - "9000:9000"

  client1:
    build:
      context: .
      dockerfile: Dockerfile.client
    depends_on:
      - server

  client2:
    build:
      context: .
      dockerfile: Dockerfile.client
    depends_on:
      - server
